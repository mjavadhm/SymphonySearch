workflows:
  android-native-workflow:
    name: Symphony Search Android Build
    instance_type: mac_mini_m1
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
        - pattern: 'master'
        
    environment:
      java: 17
      groups:
        - telegram # اطمینان حاصل کنید که متغیرهای محیطی در این گروه در تنظیمات Codemagic تعریف شده‌اند
        
    scripts:
      - name: Grant Execute Permission for Gradlew
        script: chmod +x ./gradlew
        
      - name: Build Debug APK
        script: ./gradlew clean assembleDebug --stacktrace --info --max-workers=2
             
      - name: Send APK to Telegram
        script: |
          echo "Sending APK to Telegram..."
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK not found!"
            exit 1
          fi
          
          curl -F chat_id="5368372729" \
               -F document=@"$APK_PATH" \
               -F caption="🚀 Symphony Search Build Finished 🛠" \
               http://172.245.152.11:8081/bot8060545602:AAFW0TRYOMUXV-kFYmUD8pVcp4xt9ybB1IQ/sendDocument

    artifacts:
      - app/build/outputs/apk/debug/*.apk
